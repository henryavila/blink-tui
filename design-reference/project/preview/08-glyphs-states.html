<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>blink — State glyphs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="card">
  <div class="cap">state glyphs · always coloured with their semantic token</div>
  <div class="glyph-grid">
    <div class="glyph-cell"><div class="g fg-ok">✓</div><div class="lbl">check</div></div>
    <div class="glyph-cell"><div class="g fg-err">✗</div><div class="lbl">cross</div></div>
    <div class="glyph-cell"><div class="g fg-pending">◯</div><div class="lbl">pending</div></div>
    <div class="glyph-cell"><div class="g fg-drift">◐</div><div class="lbl">drift</div></div>
    <div class="glyph-cell"><div class="g fg-accent">☑</div><div class="lbl">checked</div></div>
    <div class="glyph-cell"><div class="g fg-dim">☐</div><div class="lbl">unchecked</div></div>
    <div class="glyph-cell"><div class="g fg-warn">⚠</div><div class="lbl">warn</div></div>
    <div class="glyph-cell"><div class="g fg-info">↻</div><div class="lbl">rerun</div></div>
  </div>
  <div class="cap">ASCII fallback: <code>[x] [!] [ ] [~] [*] [ ] [!] (*)</code></div>
</div>
</body>
</html>
