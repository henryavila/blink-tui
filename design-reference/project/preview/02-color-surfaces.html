<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>blink — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="card">
  <div class="cap">surface tiers · darkest → lightest · all opaque, no gradients</div>
  <div class="swatch-row">
    <div class="swatch" style="background:var(--ctp-crust)">
      <div class="name">crust</div><div class="hex">#11111b</div>
    </div>
    <div class="swatch" style="background:var(--ctp-mantle)">
      <div class="name">mantle</div><div class="hex">#181825</div>
    </div>
    <div class="swatch" style="background:var(--ctp-base);outline:1px solid var(--ctp-surface0);outline-offset:-1px">
      <div class="name">base ◀ default bg</div><div class="hex">#1e1e2e</div>
    </div>
    <div class="swatch" style="background:var(--ctp-surface0)">
      <div class="name">surface0</div><div class="hex">#313244</div>
    </div>
    <div class="swatch" style="background:var(--ctp-surface1)">
      <div class="name">surface1</div><div class="hex">#45475a</div>
    </div>
    <div class="swatch" style="background:var(--ctp-surface2)">
      <div class="name">surface2</div><div class="hex">#585b70</div>
    </div>
  </div>
  <div class="cap">selection uses <code>surface0</code> · focused row uses <code>surface1</code></div>
</div>
</body>
</html>
