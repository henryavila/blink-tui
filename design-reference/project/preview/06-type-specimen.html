<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>blink — Type specimen</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .card { gap: 8px; }
  .name { color: var(--accent); font-size: 16px; }
  .meta { color: var(--fg-faint); font-size: 12px; }
  .specimen { font-size: 18px; line-height: 1.25; white-space: pre; }
  .small { font-size: 13px; color: var(--fg-muted); white-space: pre; }
  .dim  { color: var(--fg-dim); }
</style>
</head>
<body>
<div class="card">
  <div style="display:flex; align-items:baseline; gap:2ch">
    <span class="name">CaskaydiaMono Nerd Font</span>
    <span class="meta">one family · one size (14px) · one weight (400) · ligatures off</span>
  </div>

  <div class="specimen">ABCDEFGHIJKLMNOPQRSTUVWXYZ
abcdefghijklmnopqrstuvwxyz
0123456789  <span class="dim">!@#$%^&*()_+-=[]{};:'",.&lt;&gt;/?\|`~</span></div>

  <div class="small">the quick brown fox jumps over the lazy dog · 1234567890
THE·QUICK·BROWN·FOX·JUMPS·OVER·THE·LAZY·DOG · 0123456789</div>
</div>
</body>
</html>
