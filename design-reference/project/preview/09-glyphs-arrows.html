<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>blink — Navigation glyphs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="card">
  <div class="cap">navigation glyphs · used in lists, menus, breadcrumbs</div>
  <div class="glyph-grid" style="grid-template-columns:repeat(6,1fr)">
    <div class="glyph-cell"><div class="g fg-accent">▶</div><div class="lbl">focus</div></div>
    <div class="glyph-cell"><div class="g">▸</div><div class="lbl">collapsed</div></div>
    <div class="glyph-cell"><div class="g">▾</div><div class="lbl">expanded</div></div>
    <div class="glyph-cell"><div class="g fg-faint">↳</div><div class="lbl">depends</div></div>
    <div class="glyph-cell"><div class="g">→</div><div class="lbl">flow next</div></div>
    <div class="glyph-cell"><div class="g">◀</div><div class="lbl">back</div></div>
  </div>
  <div class="cap" style="white-space:pre">in use:
  <span class="fg-accent">▶</span> services      <span class="fg-faint">↳</span> postgres@14
  <span class="fg">▾</span> infra
    <span class="fg">▸</span> docker
    <span class="fg">▸</span> redis</div>
</div>
</body>
</html>
