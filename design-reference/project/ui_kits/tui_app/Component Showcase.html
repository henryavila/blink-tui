<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>blink — component showcase</title>
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/favicon-16.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; width: 100%;
    background: var(--ctp-crust);
    overflow: hidden;
    font-feature-settings: "liga" 0, "calt" 0;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--ctp-crust);
  }
  /* fixed character canvas: 120 cols x 40 rows. 14px → cell ≈ 8.4 x 18. */
  #canvas {
    width: 1008px; height: 720px;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 18px;
    letter-spacing: 0;
    transform-origin: center center;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .tui-cursor { animation: tui-blink 1s step-end infinite; }
  @keyframes tui-blink { 50% { opacity: 0; } }
  ::selection { background: var(--ctp-surface2); }
</style>
</head>
<body>
<div id="stage"><div id="canvas"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="glyphs.js"></script>
<script type="text/babel" src="Pane.jsx"></script>
<script type="text/babel" src="List.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Input.jsx"></script>
<script type="text/babel" src="Dialog.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Banner.jsx"></script>
<script type="text/babel" src="DescriptionList.jsx"></script>
<script type="text/babel" src="Showcase.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// blink core ships no domain glyphs; this showcase opts into the common pack.
registerGlyphs(COMMON_DOMAINS);
const DOMAIN = Object.fromEntries(Object.keys(COMMON_DOMAINS).map((k) => [k, glyph(k)]));

function fitCanvas() {
  const stage = document.getElementById("stage");
  const canvas = document.getElementById("canvas");
  const scale = Math.min(stage.clientWidth / 1008, stage.clientHeight / 720);
  canvas.style.transform = `scale(${scale})`;
}
window.addEventListener("resize", fitCanvas);

// ---------- specimen data ---------- (intent-only: state + domain NAMES)
const PROCS = [
  { id: "pg",    domain: "postgresql", name: "postgres@14.10", state: "installed", meta: ":5432" },
  { id: "redis", domain: "redis",      name: "redis@7.2",      state: "installed", meta: ":6379" },
  { id: "node",  domain: "nodejs",     name: "node · api",     state: "ok",        meta: ":3000" },
  { id: "nginx", domain: "ubuntu",     name: "nginx",          state: "drift",     meta: "drift" },
  { id: "graf",  domain: "database",   name: "grafana",        state: "missing",   meta: "missing" },
  { id: "ssh",   domain: "ssh",        name: "ssh-agent",      state: "pending",   meta: "idle" },
];

const TASKS = [
  { id: "t1", label: "pull latest images",   sel: true,  exp: null },
  { id: "t2", label: "run migrations",       sel: true,  exp: "open" },
  { id: "t3", label: "↳ 0001_init",          sel: true,  child: true },
  { id: "t4", label: "↳ 0002_add_index",     sel: false, child: true },
  { id: "t5", label: "restart services",     sel: false, exp: "closed" },
  { id: "t6", label: "tail logs",            sel: false, exp: null },
];

const STATE_GLYPHS = [
  { g: STATE.check,  name: "ok",      color: "var(--state-ok)" },
  { g: STATE.cross,  name: "err",     color: "var(--state-err)" },
  { g: STATE.circle, name: "pending", color: "var(--state-pending)" },
  { g: STATE.half,   name: "drift",   color: "var(--state-drift)" },
  { g: STATE.warn,   name: "warn",    color: "var(--state-warn)" },
  { g: STATE.rerun,  name: "rerun",   color: "var(--state-info)" },
  { g: STATE.checkboxOn,  name: "sel",   color: "var(--accent)" },
  { g: STATE.checkboxOff, name: "unsel", color: "var(--fg-dim)" },
];
const NAV_GLYPHS = [
  { g: NAV.focus, name: "focus" }, { g: NAV.collapsed, name: "closed" },
  { g: NAV.expanded, name: "open" }, { g: NAV.depends, name: "depends" },
  { g: NAV.flow, name: "flow" }, { g: NAV.back, name: "back" },
].map((x) => ({ ...x, color: "var(--fg-muted)" }));
const DOMAIN_GLYPHS = [
  { g: DOMAIN.postgresql, name: "pg", color: "var(--ctp-blue)" },
  { g: DOMAIN.redis, name: "redis", color: "var(--ctp-red)" },
  { g: DOMAIN.docker, name: "docker", color: "var(--ctp-sky)" },
  { g: DOMAIN.github, name: "github", color: "var(--fg-muted)" },
  { g: DOMAIN.git, name: "git", color: "var(--ctp-peach)" },
  { g: DOMAIN.nodejs, name: "node", color: "var(--ctp-green)" },
  { g: DOMAIN.python, name: "py", color: "var(--ctp-yellow)" },
  { g: DOMAIN.vim, name: "vim", color: "var(--ctp-green)" },
  { g: DOMAIN.linux, name: "linux", color: "var(--ctp-yellow)" },
  { g: DOMAIN.ssh, name: "ssh", color: "var(--ctp-yellow)" },
  { g: DOMAIN.ai, name: "ai", color: "var(--accent)" },
  { g: DOMAIN.bolt, name: "bolt", color: "var(--ctp-peach)" },
];
const ACCENTS = [
  { c: "var(--ctp-lavender)", n: "lavender — accent / focus / brand" },
  { c: "var(--ctp-mauve)",    n: "mauve — secondary brand" },
  { c: "var(--ctp-blue)",     n: "blue — link / refs" },
  { c: "var(--ctp-yellow)",   n: "yellow — highlight / match" },
];

function useSpinner() {
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setI((x) => (x + 1) % SPINNER.length), 80);
    return () => clearInterval(t);
  }, []);
  return SPINNER[i];
}

function App() {
  const [focusIdx, setFocusIdx] = useState(2);
  const [sel, setSel] = useState(new Set(["pg", "redis"]));
  const [searching, setSearching] = useState(false);
  const [query, setQuery] = useState("");
  const [dialog, setDialog] = useState(null);   // null | help | delete | error
  const spin = useSpinner();

  useEffect(() => { fitCanvas(); }, []);
  const current = PROCS[focusIdx];

  useEffect(() => {
    function onKey(e) {
      if (searching) {
        if (e.key === "Escape") { setSearching(false); setQuery(""); }
        else if (e.key === "Enter") setSearching(false);
        else if (e.key === "Backspace") setQuery((q) => q.slice(0, -1));
        else if (e.key.length === 1) setQuery((q) => q + e.key);
        e.preventDefault(); return;
      }
      if (dialog) {
        if (["Escape", "n", "N", "?", "Enter", "y", "Y", "l"].includes(e.key)) setDialog(null);
        e.preventDefault(); return;
      }
      switch (e.key) {
        case "ArrowDown": case "j": setFocusIdx((i) => Math.min(i + 1, PROCS.length - 1)); break;
        case "ArrowUp":   case "k": setFocusIdx((i) => Math.max(i - 1, 0)); break;
        case " ": {
          const id = current.id;
          setSel((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
          e.preventDefault(); break;
        }
        case "/": setSearching(true); e.preventDefault(); break;
        case "?": setDialog("help"); break;
        case "d": setDialog("delete"); break;
        case "e": setDialog("error"); break;
        default: break;
      }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [searching, dialog, current]);

  const procRows = PROCS.map((p) => ({
    id: p.id, domain: p.domain, state: p.state,
    label: p.name, meta: p.meta,
  }));

  const okN = PROCS.filter((p) => p.state === "installed" || p.state === "ok").length;

  const footerKeys = dialog === "help" ? [{ k: "?", desc: "close" }]
    : dialog ? [{ k: "esc", desc: "cancel" }, { k: "y", desc: "confirm" }, { k: "n", desc: "no" }]
    : searching ? [{ k: "esc", desc: "clear" }, { k: "↵", desc: "done" }]
    : [
        { k: "↑↓", desc: "move" }, { k: "spc", desc: "select" }, { k: "/", desc: "search" },
        { k: "d", desc: "delete" }, { k: "e", desc: "error" }, { k: "?", desc: "keys" },
      ];

  return (
    <React.Fragment>
      {/* title bar — the Header primitive (mark + title + right status) */}
      <Header
        mark={<span className="tui-cursor">▎</span>}
        title="blink" subtitle="‹Header›"
        right={<span style={{ whiteSpace: "pre" }}>{spin} every primitive on one screen</span>} />

      {/* body: three columns of stacked panes */}
      <div style={{ display: "flex", flex: 1, minHeight: 0, gap: 0 }}>

        {/* ---- column A : lists ---- */}
        <div style={{ display: "flex", flexDirection: "column", flex: "1 1 34%", minWidth: 0 }}>
          <Pane title={`processes ‹List›`} tone={!dialog && !searching ? "focus" : "resting"} flex="1 1 50%">
            <List rows={procRows} focusedId={current.id} selectedIds={sel} />
            <div style={{ height: "var(--cell-h)" }} />
            <div style={{ color: "var(--fg-faint)", whiteSpace: "pre", lineHeight: "18px" }}>
              {NAV.focus} focus · fill · spc selects
            </div>
          </Pane>
          <Pane title="tasks ‹glyphs›" flex="0 0 auto">
            <div style={{ display: "flex", flexDirection: "column" }}>
              {TASKS.map((t) => (
                <div key={t.id} style={{
                  display: "flex", gap: "1ch", whiteSpace: "pre", padding: "0 1ch",
                  background: t.sel && !t.child ? "var(--bg-selected)" : "transparent",
                  lineHeight: "18px",
                }}>
                  <span style={{ color: "var(--accent)", width: "1ch" }}>
                    {t.exp === "open" ? NAV.expanded : t.exp === "closed" ? NAV.collapsed : " "}
                  </span>
                  <span style={{ color: t.sel ? "var(--accent)" : "var(--fg-dim)", width: "1ch" }}>
                    {t.child ? " " : (t.sel ? STATE.checkboxOn : STATE.checkboxOff)}
                  </span>
                  <span style={{ color: t.child ? "var(--fg-dim)" : "var(--fg)" }}>{t.label}</span>
                </div>
              ))}
            </div>
          </Pane>
          <Pane title="detail ‹DescriptionList›" flex="1 1 auto">
            <DescriptionList items={[
              { value: current.name },
              { value: "detail of the focused row", muted: true },
              { term: "state", state: current.state, value: current.state },
              { term: "change", value: "keep — no action" },
              { term: "items", value: "4 steps" },
              { term: "requires", value: `${NAV.depends} pg · redis` },
            ]} />
          </Pane>
        </div>

        {/* ---- column B : inputs + glyphs ---- */}
        <div style={{ display: "flex", flexDirection: "column", flex: "1 1 34%", minWidth: 0 }}>
          <Pane title="inputs ‹Input›" flex="0 0 auto">
            <div style={{ display: "flex", flexDirection: "column", gap: "0" }}>
              <Input title="filter" value={searching ? query : ""} placeholder="type to filter…" focused={searching} />
              <div style={{ height: "var(--cell-h)" }} />
              <Input title="host" value="db.internal:5432" />
              <div style={{ height: "var(--cell-h)" }} />
              <Input title="token" value="" placeholder="paste token" error="required — field is empty" />
            </div>
          </Pane>
          <Pane title="glyphs ‹useGlyph›" flex="1 1 auto">
            <div style={{ color: "var(--fg-faint)", lineHeight: "18px", whiteSpace: "pre" }}>state</div>
            <GlyphBank items={STATE_GLYPHS} w="14ch" />
            <div style={{ height: "var(--cell-h)" }} />
            <div style={{ color: "var(--fg-faint)", lineHeight: "18px", whiteSpace: "pre" }}>navigation</div>
            <GlyphBank items={NAV_GLYPHS} w="13ch" />
            <div style={{ height: "var(--cell-h)" }} />
            <div style={{ color: "var(--fg-faint)", lineHeight: "18px", whiteSpace: "pre" }}>app glyphs · registered, not core</div>
            <GlyphBank items={DOMAIN_GLYPHS} w="10ch" />
          </Pane>
        </div>

        {/* ---- column C : status, type, borders ---- */}
        <div style={{ display: "flex", flexDirection: "column", flex: "1 1 32%", minWidth: 0 }}>
          <Pane title="motion ‹Spinner›" flex="0 0 auto">
            <div style={{ whiteSpace: "pre", lineHeight: "18px", color: "var(--state-info)" }}>
              {spin} syncing  <span style={{ color: "var(--fg-dim)" }}>3/12</span>
            </div>
            <BlockBar pct={62} width={20} />
            <div style={{ height: "var(--cell-h)" }} />
            <div style={{ whiteSpace: "pre", lineHeight: "18px" }}>
              <span style={{ color: "var(--state-ok)" }}>{STATE.check} {okN}</span>{"  "}
              <span style={{ color: "var(--state-pending)" }}>{STATE.circle} 1</span>{"  "}
              <span style={{ color: "var(--state-drift)" }}>{STATE.half} 1</span>{"  "}
              <span style={{ color: "var(--state-err)" }}>{STATE.cross} 1</span>
            </div>
            <div style={{ color: "var(--fg-dim)", lineHeight: "18px", whiteSpace: "pre" }}>
              {STATE.warn} <span style={{ color: "var(--state-warn)" }}> </span>nginx config out-of-date
            </div>
          </Pane>

          <Pane title="tokens ‹theme›" flex="0 0 auto">
            <KV k="text" v="cdd6f4 — default fg" />
            <div style={{ color: "var(--fg-muted)", lineHeight: "18px", whiteSpace: "pre" }}>          bac2de — muted</div>
            <div style={{ color: "var(--fg-dim)", lineHeight: "18px", whiteSpace: "pre" }}>          a6adc8 — dim / hints</div>
            <div style={{ height: "var(--cell-h)" }} />
            {ACCENTS.map((a, i) => (
              <div key={i} style={{ color: a.c, lineHeight: "18px", whiteSpace: "pre" }}>● {a.n}</div>
            ))}
            <div style={{ height: "var(--cell-h)" }} />
            <div style={{ color: "var(--fg-faint)", lineHeight: "18px", whiteSpace: "pre" }}>inverse = "bold"</div>
            <KeyChips chips={[{ k: "TAB" }, { k: "↵" }, { k: "?", accent: true }]} />
          </Pane>

          <Pane title="borders ‹Pane›" flex="1 1 auto">
            <div style={{ display: "flex", flexDirection: "column" }}>
              <BorderSpecimen label="resting" tone="resting" />
              <BorderSpecimen label="focus" tone="focus" />
              <BorderSpecimen label="error" tone="error" />
              <BorderSpecimen label="square" shape="square" />
            </div>
          </Pane>
        </div>
      </div>

      {/* banner — one-line in-flow notice, above the footer */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <Banner tone="success">auto-selected databases/mysql, databases/redis — required by web/valet</Banner>
        <span style={{ color: "var(--fg-faint)", paddingRight: "1ch", whiteSpace: "pre", flexShrink: 0 }}>‹Banner›</span>
      </div>

      {/* footer — always visible */}
      <Footer keys={footerKeys}
        right={`‹Footer› · ${sel.size} selected`} />

      {/* dialogs */}
      {dialog === "help" ? (
        <Dialog title="keys" width={50}
          lines={[
            "↑ ↓ / j k   move focus      spc   select",
            "/           search          d     delete",
            "e           error dialog    ?     this help",
          ]}
          actions={[{ key: " ? ", label: "close", primary: true }]} />
      ) : null}
      {dialog === "delete" ? (
        <Dialog title="delete process"
          lines={["remove this process from the host?", `${NAV.depends} ${current.name}`]}
          actions={[{ key: " N ", label: "keep", primary: true }, { key: "y", label: "delete" }]} />
      ) : null}
      {dialog === "error" ? (
        <Dialog title="error" tone="error"
          lines={[`${STATE.cross} ${current.name} — port in use`, "another process is bound to this port"]}
          actions={[{ key: " ↵ ", label: "dismiss", primary: true }, { key: "l", label: "view log" }]} />
      ) : null}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("canvas")).render(<App />);
fitCanvas();
</script>
</body>
</html>
