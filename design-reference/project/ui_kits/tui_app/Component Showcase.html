<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){try{var t=localStorage.getItem('blink-theme')||'tokyonight';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<title>blink — inventory</title>
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/favicon-16.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; width: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 18px;
    letter-spacing: 0;
    font-feature-settings: "liga" 0, "calt" 0;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .tui-cursor { animation: tui-blink 1s step-end infinite; }
  @keyframes tui-blink { 50% { opacity: 0; } }
  ::selection { background: var(--bg-focused); }

  /* theme picker rows (built from kit vocabulary; bg via class so :hover works) */
  .inv-themerow:hover { background: var(--bg-selected); }
  .inv-themerow.on { background: var(--bg-focused); }

  /* ── frame: fixed header + footer, scrolling body ── */
  .inv-app { height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
  .inv-scroll { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; }
  .inv-wrap { max-width: 1240px; margin: 0 auto; padding: 18px 20px 30px;
              display: flex; flex-direction: column; gap: 22px; }

  /* ── section ── */
  .inv-section { display: flex; flex-direction: column; gap: 8px; }
  .inv-sechead { background: var(--bg-elevated); padding: 2px 10px;
                 display: flex; align-items: baseline; }
  .inv-secn { color: var(--accent); }
  .inv-secsub { color: var(--fg-faint); font-size: 12px; white-space: pre; }
  .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
              gap: 14px; align-items: start; }
  .inv-grid.full { grid-template-columns: 1fr; }
  .inv-grid.wide { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); }

  /* ── primitives inside panes ── */
  .inv-line { white-space: pre; line-height: 18px; color: var(--fg); }
  .inv-dim { color: var(--fg-dim); }
  .inv-cap { color: var(--fg-faint); font-size: 12px; margin-top: 4px; white-space: pre-wrap; }

  .inv-swatches { display: flex; gap: 0; }
  .inv-swatch { flex: 1; min-height: 46px; padding: 6px 8px; display: flex;
                flex-direction: column; justify-content: space-between; font-size: 11px; }
  .inv-sw-n { font-size: 12px; }
  .inv-sw-h { opacity: 0.7; }

  .inv-bullets { display: flex; flex-wrap: wrap; column-gap: 2ch; row-gap: 0; }
  .inv-bullet { white-space: pre; line-height: 18px; color: var(--fg-dim); width: 13ch; }

  .inv-kv { display: flex; align-items: baseline; gap: 1ch; white-space: pre; line-height: 18px; }
  .inv-tok { color: var(--fg); width: 16ch; flex-shrink: 0; }
  .inv-role { color: var(--fg-dim); }

  .inv-legend { display: flex; flex-direction: column; }
  .inv-legrow { display: flex; align-items: baseline; gap: 1ch; white-space: pre; line-height: 18px; }
  .inv-legrow .g { width: 2ch; text-align: center; flex-shrink: 0; }
  .inv-legrow .n { color: var(--fg); width: 13ch; flex-shrink: 0; }
  .inv-legrow .m { color: var(--fg-dim); }

  .inv-box { white-space: pre; line-height: 18px; color: var(--fg-faint); }

  .inv-pack { margin-bottom: 8px; }
  .inv-packhd { color: var(--accent); font-size: 12px; }
  .inv-packn { color: var(--fg-faint); }
  .inv-packgrid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 1px 6px; margin-top: 2px; }
  .inv-gcell { display: flex; align-items: baseline; gap: 1ch; white-space: nowrap; padding: 1px 4px; }
  .inv-gcell .g { width: 1.5ch; flex-shrink: 0; font-size: 15px; line-height: 1; }
  .inv-gcell .l { color: var(--fg-dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; }

  .inv-api { white-space: pre; color: var(--fg-muted); font-size: 12px; line-height: 1.5; }
  .inv-idx { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px 8px; }
  .inv-icell { display: flex; align-items: baseline; gap: 1ch; white-space: nowrap; }
  .inv-icell .g { color: var(--fg-muted); width: 1.5ch; flex-shrink: 0; font-size: 15px; line-height: 1; }
  .inv-icell .l { color: var(--fg-disabled); font-size: 11px; overflow: hidden; text-overflow: ellipsis; }

  .inv-end { color: var(--fg-faint); text-align: center; padding: 12px 0 4px; font-size: 13px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="glyphs.js"></script>
<script src="glyph-index.js"></script>
<script src="glyph-packs.js"></script>
<script src="theme.js"></script>
<script type="text/babel" src="Pane.jsx"></script>
<script type="text/babel" src="List.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Banner.jsx"></script>
<script type="text/babel" src="DescriptionList.jsx"></script>
<script type="text/babel" src="Input.jsx"></script>
<script type="text/babel" src="Dialog.jsx"></script>
<script type="text/babel" src="Showcase.jsx"></script>
<script type="text/babel" src="Inventory.jsx"></script>

<script type="text/babel">
  // The app opts into glyphs (blink core ships none registered):
  // Tier 1 pack + one domain via the easy nf form (codepoint from the raw index).
  registerGlyphs(COMMON_DOMAINS);
  registerGlyphs({ grafana: { nf: "fa-fire", color: "var(--domain-amber)" } });

  // — a theme created by the APP at runtime (no framework edits) — it shows up
  //   in the picker automatically. This is the registerTheme() escape hatch.
  BlinkTheme.registerTheme({
    id: "dracula", label: "dracula", mode: "dark", blurb: "registered by the app · registerTheme()",
    palette: {
      crust: "#191a21", mantle: "#21222c", base: "#282a36", surface0: "#343746",
      surface1: "#44475a", surface2: "#565872", overlay0: "#6272a4", overlay1: "#7884b8",
      overlay2: "#9aa4cc", subtext0: "#c8cad4", subtext1: "#e2e3ea", text: "#f8f8f2",
      rosewater: "#f8e9e0", flamingo: "#ffd9c4", pink: "#ff79c6", mauve: "#bd93f9",
      red: "#ff5555", maroon: "#ff6e6e", peach: "#ffb86c", yellow: "#f1fa8c",
      green: "#50fa7b", teal: "#5ef1c6", sky: "#8be9fd", sapphire: "#62d6e8",
      blue: "#6f9eef", lavender: "#bd93f9",
    },
  });

  ReactDOM.createRoot(document.getElementById("root")).render(<Inventory />);
</script>
</body>
</html>
