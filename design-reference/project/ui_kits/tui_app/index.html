<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>svcd — built with blink</title>
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/favicon-16.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; width: 100%;
    background: var(--ctp-crust);
    overflow: hidden;
    font-feature-settings: "liga" 0, "calt" 0;
  }
  /* full-viewport stage that letterboxes the fixed cell canvas */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--ctp-crust);
  }
  /* the app is a fixed character canvas: 100 cols x 30 rows.
     14px font → cell ≈ 8.4 x 18 → 840 x 540 design box. */
  #canvas {
    width: 840px; height: 540px;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 18px;
    letter-spacing: 0;
    transform-origin: center center;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .tui-cursor { animation: tui-blink 1s step-end infinite; }
  @keyframes tui-blink { 50% { opacity: 0; } }
  ::selection { background: var(--ctp-surface2); }
</style>
</head>
<body>
<div id="stage"><div id="canvas"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="glyphs.js"></script>
<script type="text/babel" src="Pane.jsx"></script>
<script type="text/babel" src="List.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Input.jsx"></script>
<script type="text/babel" src="Dialog.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ---- app opts into glyphs (blink core ships none) ----
// This reference app brings its own domain glyphs: it takes the optional
// COMMON_DOMAINS convenience pack. Components resolve them by NAME via glyph().
registerGlyphs(COMMON_DOMAINS);

// ---- scale the fixed canvas to fit the viewport (letterbox) ----
function fitCanvas() {
  const stage = document.getElementById("stage");
  const canvas = document.getElementById("canvas");
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const scale = Math.min(sw / 840, sh / 540);
  canvas.style.transform = `scale(${scale})`;
}
window.addEventListener("resize", fitCanvas);

// ---- demo data: a fictional local-services manager ---- (intent-only)
const SERVICES = [
  { id: "pg",     domain: "postgresql", name: "postgres@14.10", state: "ok",      detail: "data/pg/main",        port: 5432 },
  { id: "redis",  domain: "redis",      name: "redis@7.2",      state: "ok",      detail: "/var/redis",          port: 6379 },
  { id: "docker", domain: "docker",     name: "docker",         state: "pending", detail: "28 containers · 4 stopped", port: null },
  { id: "nginx",  domain: "ubuntu",     name: "nginx",          state: "drift",   detail: "config out-of-date",  port: 80 },
  { id: "node",   domain: "nodejs",     name: "node · api",     state: "ok",      detail: "pid 4821 · :3000",    port: 3000 },
  { id: "graf",   domain: "database",   name: "grafana",        state: "err",     detail: "missing on host",     port: 3001 },
  { id: "ssh",    domain: "ssh",        name: "ssh-agent",      state: "ok",      detail: "3 keys loaded",       port: null },
];

function useSpinner(active) {
  const [i, setI] = useState(0);
  useEffect(() => {
    if (!active) return;
    const t = setInterval(() => setI((x) => (x + 1) % SPINNER.length), 80);
    return () => clearInterval(t);
  }, [active]);
  return SPINNER[i];
}

function App() {
  const [services, setServices] = useState(SERVICES);
  const [focusIdx, setFocusIdx] = useState(2);     // row focus in left pane
  const [pane, setPane] = useState("left");        // "left" | "right"
  const [dialog, setDialog] = useState(null);      // null | "delete" | "help" | "error"
  const [searching, setSearching] = useState(false);
  const [query, setQuery] = useState("");
  const [syncing, setSyncing] = useState(null);    // id being applied
  const [status, setStatus] = useState("ready");

  const spin = useSpinner(syncing != null);

  useEffect(() => { fitCanvas(); }, []);

  const filtered = services.filter((s) =>
    query === "" || s.name.toLowerCase().includes(query.toLowerCase()));
  const safeIdx = Math.min(focusIdx, Math.max(0, filtered.length - 1));
  const current = filtered[safeIdx];

  useEffect(() => {
    function onKey(e) {
      // search field captures typing
      if (searching) {
        if (e.key === "Escape") { setSearching(false); setQuery(""); }
        else if (e.key === "Enter") { setSearching(false); }
        else if (e.key === "Backspace") { setQuery((q) => q.slice(0, -1)); }
        else if (e.key.length === 1) { setQuery((q) => q + e.key); }
        e.preventDefault();
        return;
      }
      // dialog captures y/n/esc
      if (dialog) {
        if (e.key === "Escape" || e.key === "n" || e.key === "N") setDialog(null);
        else if (dialog === "delete" && (e.key === "y" || e.key === "Y")) {
          setServices((ss) => ss.filter((s) => s.id !== current.id));
          setDialog(null); setStatus("removed " + current.name);
        } else if (dialog === "help" && e.key === "?") setDialog(null);
        else if (dialog === "error" && (e.key === "Enter" || e.key === "l")) setDialog(null);
        e.preventDefault();
        return;
      }
      // normal navigation
      switch (e.key) {
        case "ArrowDown": case "j":
          setFocusIdx((i) => Math.min(i + 1, filtered.length - 1)); break;
        case "ArrowUp": case "k":
          setFocusIdx((i) => Math.max(i - 1, 0)); break;
        case "Tab":
          setPane((p) => (p === "left" ? "right" : "left")); e.preventDefault(); break;
        case "/":
          setSearching(true); setPane("left"); e.preventDefault(); break;
        case "a":
          if (current) {
            if (current.state === "err") { setDialog("error"); }
            else {
              setSyncing(current.id); setStatus("applying " + current.name);
              setTimeout(() => {
                setServices((ss) => ss.map((s) => s.id === current.id ? { ...s, state: "ok", detail: s.id === "nginx" ? "config in sync" : s.detail } : s));
                setSyncing(null); setStatus("applied " + current.name);
              }, 1600);
            }
          }
          break;
        case "d":
          if (current) setDialog("delete"); break;
        case "?":
          setDialog("help"); break;
        case "q":
          setServices(SERVICES); setFocusIdx(2); setQuery(""); setStatus("ready"); break;
        default: break;
      }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [searching, dialog, filtered.length, current]);

  // left pane rows
  const rows = filtered.map((s) => {
    const isSyncing = syncing === s.id;
    return {
      id: s.id,
      domain: s.domain,
      state: isSyncing ? "idempotent" : s.state,
      label: s.name,
      meta: isSyncing ? "applying…" : s.detail,
    };
  });

  // counts for status
  const counts = services.reduce((a, s) => { a[s.state] = (a[s.state] || 0) + 1; return a; }, {});

  const footerKeys = dialog === "help" ? [{ k: "?", desc: "close help" }]
    : dialog ? [{ k: "esc", desc: "cancel" }, { k: "y", desc: "confirm" }, { k: "n", desc: "no" }]
    : searching ? [{ k: "esc", desc: "clear" }, { k: "↵", desc: "done" }]
    : [
        { k: "tab", desc: "pane" },
        { k: "↵", desc: "open" },
        { k: "/", desc: "search" },
        { k: "a", desc: "apply" },
        { k: "d", desc: "delete" },
        { k: "?", desc: "help" },
        { k: "q", desc: "reset" },
      ].slice(0, 6);

  return (
    <React.Fragment>
      {/* title bar */}
      <div style={{
        background: "var(--bg-inverse)", color: "var(--fg-inverse)",
        padding: "0 1ch", whiteSpace: "pre", display: "flex",
        justifyContent: "space-between", lineHeight: "18px",
      }}>
        <span>▎ svcd <span style={{ opacity: 0.7 }}>· built with blink</span></span>
        <span>{syncing ? `${spin} ${status}` : status}</span>
      </div>

      {/* search field (only when active) */}
      {searching ? (
        <div style={{ padding: "0 0" }}>
          <Input title="search" value={query} placeholder="type to filter services…" focused={true} />
        </div>
      ) : null}

      {/* two-pane body */}
      <div style={{ display: "flex", flex: 1, minHeight: 0, gap: 0 }}>
        <div style={{ display: "flex", flexDirection: "column", flex: "1 1 56%", minWidth: 0 }}>
          <Pane title={`services (${filtered.length})`} tone={pane === "left" && !dialog ? "focus" : "resting"}>
            <List rows={rows} focusedId={current ? current.id : null} />
          </Pane>
        </div>
        <div style={{ display: "flex", flexDirection: "column", flex: "1 1 44%", minWidth: 0 }}>
          <Pane title="detail" tone={pane === "right" && !dialog ? "focus" : "resting"}>
            {current ? <Detail s={services.find((x) => x.id === current.id)} counts={counts} /> : <Empty />}
          </Pane>
        </div>
      </div>

      {/* footer always visible */}
      <Footer keys={footerKeys}
        right={`✓ ${counts.ok || 0}  ◯ ${counts.pending || 0}  ◐ ${counts.drift || 0}  ✗ ${counts.err || 0}`} />

      {/* dialogs */}
      {dialog === "delete" && current ? (
        <Dialog title="delete service"
          lines={["remove this service from svcd?", `${NAV.depends} ${current.name}`]}
          actions={[{ key: " N ", label: "keep", primary: true }, { key: "y", label: "delete" }]} />
      ) : null}
      {dialog === "error" ? (
        <Dialog title="error" tone="error"
          lines={[`${STATE.cross} ${current ? current.name : "service"} is missing on host`, "cannot apply a service that isn't installed"]}
          actions={[{ key: " ↵ ", label: "dismiss", primary: true }, { key: "l", label: "view log" }]} />
      ) : null}
      {dialog === "help" ? (
        <Dialog title="keys" width={48}
          lines={[
            "↑ ↓ / j k   move focus",
            "tab         switch pane",
            "/           search      a   apply",
            "d           delete      q   reset demo",
          ]}
          actions={[{ key: " ? ", label: "close", primary: true }]} />
      ) : null}
    </React.Fragment>
  );
}

function Detail({ s, counts }) {
  if (!s) return <Empty />;
  const sg = stateGlyph(s.state);
  const stateWord = { ok: "running", err: "missing", pending: "starting", drift: "drift" }[s.state];
  return (
    <div style={{ display: "flex", flexDirection: "column", whiteSpace: "pre" }}>
      <div style={{ lineHeight: "18px" }}>
        <span style={{ color: glyphColor(s.domain) }}>{glyph(s.domain)}</span>{"  "}
        <span style={{ color: "var(--fg)" }}>{s.name}</span>
      </div>
      <div style={{ height: "18px" }} />
      <Row k="state"  v={<span style={{ color: sg.color }}>{sg.glyph} {stateWord}</span>} />
      <Row k="path"   v={s.detail} />
      <Row k="port"   v={s.port == null ? "—" : String(s.port)} />
      <div style={{ height: "18px" }} />
      <div style={{ color: "var(--fg-faint)", lineHeight: "18px" }}>{NAV.depends} actions</div>
      <div style={{ color: "var(--fg-dim)", lineHeight: "18px" }}>
        {s.state === "ok" ? `${STATE.rerun} a  reapply (idempotent)` : `${glyph("bolt")} a  apply now`}
      </div>
      <div style={{ color: "var(--fg-dim)", lineHeight: "18px" }}>{STATE.cross} d  remove</div>
    </div>
  );
}

function Row({ k, v }) {
  return (
    <div style={{ display: "flex", whiteSpace: "pre", lineHeight: "18px" }}>
      <span style={{ color: "var(--fg-faint)", width: "8ch", flexShrink: 0 }}>{k}</span>
      <span style={{ color: "var(--fg)" }}>{v}</span>
    </div>
  );
}

function Empty() {
  return <div style={{ color: "var(--fg-dim)", lineHeight: "18px" }}>no service selected</div>;
}

ReactDOM.createRoot(document.getElementById("canvas")).render(<App />);
fitCanvas();
</script>
</body>
</html>
